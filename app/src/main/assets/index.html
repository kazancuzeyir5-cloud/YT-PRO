<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YT-PRO Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ══ TEMEL DEĞİŞKENLER ══ */
:root {
  --bg:#0a0a0a; --bg2:#111111; --bg3:#1c1c1c;
  --accent:#e50914; --accent2:#ff2020; --red-glow:rgba(229,9,20,0.35);
  --white:#ffffff; --gray:#999999; --gray2:#2a2a2a;
  --text:#f0f0f0; --card:#181818; --border:rgba(229,9,20,0.25);
  --tr:0.25s cubic-bezier(0.4,0,0.2,1);
  --app-logo-content: 'YT-PRO'; /* Ayarlardan değişecek */
}
[data-theme="light"] { --bg:#f5f5f5; --bg2:#ebebeb; --bg3:#dcdcdc; --card:#ffffff; --text:#1a1a1a; --gray:#666666; --gray2:#d0d0d0; --border:rgba(229,9,20,0.3); }
[data-theme="blue"] { --bg:#050a14; --bg2:#0d1526; --bg3:#162035; --accent:#1a6aff; --accent2:#4d8fff; --red-glow:rgba(26,106,255,0.35); --card:#0d1a2e; --gray2:#1a2e4a; --border:rgba(26,106,255,0.25); --text:#e8f0ff; }
[data-theme="purple"] { --bg:#08050f; --bg2:#100a1e; --bg3:#1a1030; --accent:#9c40ff; --accent2:#bf80ff; --red-glow:rgba(156,64,255,0.35); --card:#100a1e; --gray2:#1e1035; --border:rgba(156,64,255,0.25); --text:#f0e8ff; }

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;overscroll-behavior-y:contain;}

/* ══ PULL TO REFRESH (YENİLEME) ══ */
.ptr-wrap { position:absolute; top:-50px; left:0; right:0; display:flex; justify-content:center; align-items:center; z-index:150; transition:transform 0.2s ease; }
.ptr-spinner { width:32px; height:32px; border:3px solid var(--gray2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; background:var(--bg2); box-shadow:0 4px 12px rgba(0,0,0,.5); }

/* ══ TOPBAR ══ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:200;padding-top:max(12px,env(safe-area-inset-top));}
.topbar-left{display:flex;align-items:center;gap:12px;}
.menu-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:5px;}
.menu-btn span{display:block;height:2px;background:var(--accent);border-radius:2px;transition:var(--tr);}
.menu-btn span:nth-child(1){width:100%;} .menu-btn span:nth-child(2){width:70%;} .menu-btn span:nth-child(3){width:100%;}
.logo::before { content: var(--app-logo-content); font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; color:var(--white); text-shadow:0 0 10px var(--red-glow); }
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:var(--tr);}
.icon-btn:active{transform:scale(0.9); border-color:var(--accent); color:var(--accent);}

/* ══ COMPACT SEARCH OVERLAY ══ */
.search-overlay { position:absolute; top:0; left:0; right:0; background:var(--bg2); padding:12px 16px; padding-top:max(12px,env(safe-area-inset-top)); display:flex; gap:10px; align-items:center; transform:translateY(-100%); transition:var(--tr); z-index:250; box-shadow:0 4px 20px rgba(0,0,0,.5); }
.search-overlay.open { transform:translateY(0); }
.search-input-wrap { flex:1; display:flex; align-items:center; background:var(--bg3); border:1px solid var(--accent); border-radius:12px; padding:0 14px; }
.search-input-wrap input { flex:1; background:none; border:none; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px; padding:12px 0; outline:none; }
.close-search { background:none; border:none; color:var(--gray); font-size:16px; cursor:pointer; font-weight:bold; }

/* ══ TABS & LISTS ══ */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.tab-btn{flex:1;padding:14px 0;background:none;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gray);transition:var(--tr);position:relative;}
.tab-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);width:40%;height:3px;background:var(--accent);transition:var(--tr);border-radius:3px 3px 0 0;box-shadow:0 0 10px var(--red-glow);}
.tab-btn.active{color:var(--white);} .tab-btn.active::after{transform:translateX(-50%) scaleX(1);}

.main{flex:1;position:relative;display:flex;flex-direction:column;overflow:hidden;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;animation:fadein .3s ease;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}

.filter-bar{display:flex;gap:8px;padding:12px 16px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--gray2);background:var(--bg3);color:var(--gray);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:var(--tr);}
.f-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(229,9,20,.1);box-shadow:0 0 10px var(--red-glow);}

.list-area{flex:1;overflow-y:auto;padding:0 12px 20px;}
.list-area::-webkit-scrollbar{width:3px;} .list-area::-webkit-scrollbar-thumb{background:var(--accent);}

/* ══ CARDS ══ */
.media-card { display:flex; gap:12px; align-items:center; padding:10px; border-radius:12px; background:var(--card); margin-bottom:10px; border:1px solid transparent; transition:var(--tr); cursor:pointer; }
.media-card:active { transform:scale(0.98); border-color:var(--accent); }
.thumb { width:100px; height:60px; border-radius:8px; overflow:hidden; position:relative; background:var(--bg3); flex-shrink:0; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.thumb-dur { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,.8); color:#fff; font-family:'Share Tech Mono',monospace; font-size:10px; padding:2px 5px; border-radius:4px; }
.info { flex:1; min-width:0; }
.title { font-size:15px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.meta { font-size:12px; color:var(--gray); font-family:'Share Tech Mono',monospace; }

/* ══ BOTTOM BAR ══ */
.bottombar{background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;flex-shrink:0;padding:8px 0 max(12px,env(safe-area-inset-bottom));z-index:300;}
.bot-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--gray);transition:var(--tr);padding:6px;}
.bot-btn.active, .bot-btn:active{color:var(--accent);}
.bot-btn svg{width:24px;height:24px;}
.bot-btn span{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1.5px;}

/* ══════════════════════════════════════
   TAM EKRAN VİDEOLU OYNATICI (YENİ)
══════════════════════════════════════ */
.player-panel {
  display:none; position:fixed; inset:0; background:var(--bg2); z-index:1000;
  flex-direction:column; transition:transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
  transform:translateY(100%);
}
.player-panel.visible { display:flex; transform:translateY(0); }
.player-head {
  display:flex; justify-content:space-between; align-items:center; padding:16px 20px;
  padding-top:max(16px,env(safe-area-inset-top)); border-bottom:1px solid rgba(255,255,255,0.05);
}
.player-close { background:none; border:none; color:var(--white); font-size:32px; cursor:pointer; line-height:1; }
.player-dl-btn { background:rgba(229,9,20,.15); border:1px solid var(--accent); color:var(--accent); border-radius:20px; padding:6px 16px; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; display:flex; align-items:center; gap:6px; cursor:pointer; transition:var(--tr); }
.player-dl-btn:active { transform:scale(0.95); background:var(--accent); color:#fff; }

/* Video veya Thumbnail Alanı */
.player-media-area { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; overflow:hidden; position:relative; }
.player-media-wrap { width:100%; max-width:400px; aspect-ratio:16/9; border-radius:16px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,.8); border:2px solid var(--gray2); position:relative; background:#000; transition:var(--tr); }
.player-media-wrap.audio-mode { aspect-ratio:1/1; max-width:300px; border-radius:24px; border-color:var(--accent); box-shadow:0 10px 40px var(--red-glow); animation:pulseArt 3s infinite; }
@keyframes pulseArt{0%,100%{box-shadow:0 0 0 0 var(--red-glow);}50%{box-shadow:0 0 0 15px rgba(229,9,20,0);}}
.player-media-wrap img, .player-media-wrap video { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }

.player-bottom { padding:20px 24px; padding-bottom:max(24px,env(safe-area-inset-bottom)); background:linear-gradient(0deg, var(--bg) 0%, transparent 100%); }
.p-title { font-size:24px; font-weight:700; color:#fff; margin-bottom:4px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.p-artist { font-size:14px; color:var(--gray); text-align:center; font-family:'Share Tech Mono',monospace; margin-bottom:24px; }

/* Slider */
.slider-wrap{position:relative;height:24px;display:flex;align-items:center;cursor:pointer;}
.slider-track{position:absolute;left:0;right:0;height:4px;background:var(--gray2);border-radius:2px;}
.slider-fill{height:100%;border-radius:2px;background:var(--accent);box-shadow:0 0 10px var(--red-glow);pointer-events:none;}
.slider-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 0 8px var(--red-glow);pointer-events:none;transition:transform .1s;}
.slider-wrap:active .slider-thumb{transform:translate(-50%,-50%) scale(1.3);}
.time-row { display:flex; justify-content:space-between; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--gray); margin-top:8px; margin-bottom:20px; }

/* Controls */
.p-controls { display:flex; align-items:center; justify-content:center; gap:24px; }
.c-btn { background:none; border:none; color:var(--white); cursor:pointer; transition:var(--tr); display:flex; align-items:center; justify-content:center; }
.c-btn:active { transform:scale(0.8); color:var(--accent); }
.c-play { width:72px; height:72px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 0 24px var(--red-glow); transition:var(--tr); cursor:pointer; border:none; }
.c-play:active { transform:scale(0.9); }
.c-play svg { width:36px; height:36px; fill:currentColor; margin-left:4px; }
.c-play.playing svg { margin-left:0; }

/* ══ DRAWER & MODALS ══ */
.overlay, .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:350;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show, .modal-overlay.show{opacity:1;pointer-events:all;display:flex;align-items:center;justify-content:center;}
.drawer{position:fixed;left:-300px;top:0;bottom:0;width:300px;background:var(--bg2);border-right:1px solid var(--border);z-index:400;transition:left .3s ease;display:flex;flex-direction:column;}
.drawer.open{left:0;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:90%;max-width:380px;animation:modalin .2s ease;overflow:hidden;}
@keyframes modalin{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:20px;}

/* ══ NOTIFICATION TOAST ══ */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:15px;padding:12px 28px;border-radius:30px;z-index:3000;opacity:0;pointer-events:none;transition:all .3s ease;box-shadow:0 8px 24px rgba(229,9,20,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="ptr-wrap" id="ptrWrap"><div class="ptr-spinner"></div></div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="toast" id="toast"></div>

<div class="search-overlay" id="searchOverlay">
  <div class="search-input-wrap">
    <svg viewBox="0 0 24 24" fill="var(--accent)" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="searchInput" placeholder="Şarkı veya video ara..." onkeydown="if(event.key==='Enter') doGlobalSearch()" />
  </div>
  <button class="close-search" onclick="toggleSearch()">✕</button>
</div>

<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" onclick="toggleDrawer()"><span></span><span></span><span></span></button>
    <div class="logo"></div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="openUrlModal()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleSearch()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-songs" onclick="switchTab('songs')">♪ ŞARKILAR</button>
  <button class="tab-btn" id="tab-videos" onclick="switchTab('videos')">▶ VİDEOLAR</button>
</div>

<div class="main" id="mainArea">
  <div class="tab-panel active" id="panel-songs">
    <div class="filter-bar" id="songFilters">
      <button class="f-btn active" onclick="setSongFilter(this,'popular')">🔥 TREND MÜZİK</button>
      <button class="f-btn" onclick="setSongFilter(this,'rap')">🎤 RAP</button>
      <button class="f-btn" onclick="setSongFilter(this,'pop')">🎶 POP HIT</button>
      <button class="f-btn" onclick="setSongFilter(this,'slow')">🌙 YAVAŞ / AKUSTİK</button>
    </div>
    <div class="list-area" id="songList"></div>
  </div>
  <div class="tab-panel" id="panel-videos">
    <div class="filter-bar" id="videoFilters">
      <button class="f-btn active" onclick="setVideoFilter(this,'popular')">🔥 POPÜLER KLİPLER</button>
      <button class="f-btn" onclick="setVideoFilter(this,'new')">✨ YENİ KLİPLER</button>
      <button class="f-btn" onclick="setVideoFilter(this,'top')">👑 TOP 50 KLİP</button>
    </div>
    <div class="list-area" id="videoList"></div>
  </div>
</div>

<div class="bottombar">
  <button class="bot-btn" onclick="alert('İndirilenler yakında eklenecek!')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg><span>İNDİRİLENLER</span></button>
  <button class="bot-btn active" onclick="togglePlayer()" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 7.48 2 12s4.48 9 9 10 9-4.03 9-9-4.48-9-9-9zm-2 13.5v-9l6 4.5-6 4.5z"/></svg><span style="font-weight:bold;">OYNATICI</span></button>
  <button class="bot-btn" onclick="openSettings()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg><span>AYARLAR</span></button>
</div>

<div class="player-panel" id="playerPanel">
  <div class="player-head">
    <button class="player-close" onclick="togglePlayer()">⌄</button>
    <div style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:16px;color:var(--gray);">ŞU AN ÇALIYOR</div>
    <button class="player-dl-btn" onclick="downloadCurrentMedia()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> İNDİR
    </button>
  </div>
  
  <div class="player-media-area">
    <div class="player-media-wrap" id="playerMediaWrap">
      <img id="playerArt" src="" style="display:none;" />
      <video id="nativePlayer" playsinline preload="auto"></video>
    </div>
  </div>

  <div class="player-bottom">
    <div class="p-title" id="playerTitle">Müzik Seçilmedi</div>
    <div class="p-artist" id="playerArtist">YT-PRO</div>
    
    <div class="slider-wrap" id="progSlider">
      <div class="slider-track"><div class="slider-fill" id="progFill" style="width:0%"></div></div>
      <div class="slider-thumb" id="progThumb" style="left:0%"></div>
    </div>
    <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="totTime">0:00</span>
    </div>

    <div class="p-controls">
      <button class="c-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="c-play" id="playMain" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="c-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-head">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--white);">AYARLAR</span>
      <button class="icon-btn" style="width:32px;height:32px;" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-family:'Bebas Neue',sans-serif;color:var(--accent);letter-spacing:2px;margin-bottom:10px;">UYGULAMA LOGOSU</div>
      <select id="logoSelect" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:white;padding:12px;border-radius:8px;outline:none;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:20px;" onchange="changeLogo(this.value)">
        <option value="'YT-PRO'">YT-PRO (Standart)</option>
        <option value="'YT-PRO 🎵'">YT-PRO 🎵 (Müzik)</option>
        <option value="'YT-PRO 🎬'">YT-PRO 🎬 (Sinema)</option>
        <option value="'YTP Premium'">YTP Premium</option>
      </select>

      <div style="font-family:'Bebas Neue',sans-serif;color:var(--accent);letter-spacing:2px;margin-bottom:10px;">TEMA RENGİ</div>
      <div style="display:flex;gap:10px;margin-bottom:20px;">
        <button onclick="applyTheme('dark')" style="flex:1;padding:10px;background:#111;border:2px solid #e50914;color:white;border-radius:8px;font-weight:bold;">Kırmızı</button>
        <button onclick="applyTheme('blue')" style="flex:1;padding:10px;background:#0d1526;border:2px solid #1a6aff;color:white;border-radius:8px;font-weight:bold;">Mavi</button>
        <button onclick="applyTheme('purple')" style="flex:1;padding:10px;background:#100a1e;border:2px solid #9c40ff;color:white;border-radius:8px;font-weight:bold;">Mor</button>
      </div>
      <button onclick="closeSettings()" style="width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:white;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;">KAYDET VE ÇIK</button>
    </div>
  </div>
</div>

<script>
// ══ DURUM YÖNETİMİ ══
let activeTab = 'songs';
let isPlaying = false;
let currentMedia = null; // {title, artist, thumb, url, type, ytId}
let mediaData = { songs:[], videos:[] };

// ══ ANDROID GERİ TUŞU YAKALAMA (XIAOMI GESTURE FIX) ══
// Android tarafında onBackPressed() çalıştığında bu JS fonksiyonunu çağıracak.
window.handleAndroidBack = function() {
  if (document.getElementById('playerPanel').classList.contains('visible')) { togglePlayer(); return true; }
  if (document.getElementById('settingsModal').classList.contains('show')) { closeSettings(); return true; }
  if (document.getElementById('searchOverlay').classList.contains('open')) { toggleSearch(); return true; }
  return false; // Hiçbir pencere açık değilse false döndür, Android uygulamayı kapatsın.
};

// ══ PULL TO REFRESH (KAYDIRARAK YENİLEME) ══
let startY = 0, isPulling = false;
const ptrWrap = document.getElementById('ptrWrap');
const mainArea = document.getElementById('mainArea');

mainArea.addEventListener('touchstart', e => {
  const activeList = document.querySelector('.tab-panel.active .list-area');
  if (activeList && activeList.scrollTop === 0) { startY = e.touches[0].clientY; isPulling = true; }
}, {passive:true});

mainArea.addEventListener('touchmove', e => {
  if (!isPulling) return;
  const y = e.touches[0].clientY;
  if (y > startY + 15) { ptrWrap.style.transform = `translateY(${Math.min(y - startY, 70)}px)`; }
}, {passive:true});

mainArea.addEventListener('touchend', e => {
  if (!isPulling) return;
  isPulling = false;
  if (ptrWrap.style.transform === 'translateY(70px)') {
    showToast('🔄 Sayfa Yenileniyor...');
    setTimeout(() => {
      if(activeTab === 'songs') initSongs(); else initVideos();
      ptrWrap.style.transform = `translateY(-50px)`;
    }, 800);
  } else {
    ptrWrap.style.transform = `translateY(-50px)`;
  }
});

// ══ UI FONKSİYONLARI ══
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }
function switchTab(t){ activeTab=t; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+t).classList.add('active'); }
function toggleSearch(){ document.getElementById('searchOverlay').classList.toggle('open'); document.getElementById('searchInput').focus(); }
function openSettings(){ document.getElementById('settingsModal').classList.add('show'); }
function closeSettings(){ document.getElementById('settingsModal').classList.remove('show'); }
function changeLogo(val){ document.documentElement.style.setProperty('--app-logo-content', val); }
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); }

// ══ VERİ ÇEKME VE LİSTELEME ══
function initSongs(filter='türkçe pop şarkılar audio') {
  document.getElementById('songList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);">Yükleniyor...</div>';
  if(typeof YTPROAndroid !== 'undefined') YTPROAndroid.searchWithNewPipe(filter, 'onSongsLoaded');
}
function onSongsLoaded(data) {
  mediaData.songs = data;
  document.getElementById('songList').innerHTML = data.map((s,i) => `
    <div class="media-card" onclick="playMedia('song', ${i})">
      <div class="thumb"><img src="${s.thumb||''}"><span class="thumb-dur">${s.duration}</span></div>
      <div class="info"><div class="title">${s.title}</div><div class="meta">${s.artist||s.channel}</div></div>
    </div>`).join('');
}

function initVideos(filter='türkçe pop klipler') {
  document.getElementById('videoList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);">Yükleniyor...</div>';
  if(typeof YTPROAndroid !== 'undefined') YTPROAndroid.searchWithNewPipe(filter, 'onVideosLoaded');
}
function onVideosLoaded(data) {
  mediaData.videos = data;
  document.getElementById('videoList').innerHTML = data.map((v,i) => `
    <div class="media-card" onclick="playMedia('video', ${i})">
      <div class="thumb"><img src="${v.thumb||''}"><span class="thumb-dur">${v.duration}</span></div>
      <div class="info"><div class="title">${v.title}</div><div class="meta">${v.channel}</div></div>
    </div>`).join('');
}

function doGlobalSearch() {
  const q = document.getElementById('searchInput').value;
  if(!q) return; toggleSearch();
  if(activeTab === 'songs') initSongs(q + ' audio'); else initVideos(q);
}

// ══ VİDEOLU TAM EKRAN OYNATICI ══
const nativePlayer = document.getElementById('nativePlayer');
const playerArt = document.getElementById('playerArt');
const mediaWrap = document.getElementById('playerMediaWrap');

function playMedia(type, idx) {
  const item = mediaData[type+'s'][idx];
  currentMedia = { ...item, mediaType: type };
  document.getElementById('playerTitle').textContent = item.title;
  document.getElementById('playerArtist').textContent = item.artist || item.channel;
  
  // Audio mu Video mu?
  if(type === 'song') {
    nativePlayer.style.display = 'none';
    playerArt.style.display = 'block';
    playerArt.src = item.thumb || '';
    mediaWrap.classList.add('audio-mode');
  } else {
    playerArt.style.display = 'none';
    nativePlayer.style.display = 'block';
    nativePlayer.poster = item.thumb || '';
    mediaWrap.classList.remove('audio-mode');
  }

  // Android'den Stream URL iste
  if(typeof YTPROAndroid !== 'undefined') {
    showToast('Link çözülüyor...');
    YTPROAndroid.getPreviewUrl(item.url || ('https://youtube.com/watch?v='+item.id), 'onStreamReady');
  }
  
  document.getElementById('playerPanel').classList.add('visible');
}

function onStreamReady(info) {
  if(!info) { showToast('Medya oynatılamıyor.'); return; }
  nativePlayer.src = (currentMedia.mediaType === 'song') ? (info.bestAudioUrl || info.previewVideoUrl) : (info.previewVideoUrl || info.bestAudioUrl);
  nativePlayer.play(); setPlay(true);
}

function togglePlayer() { document.getElementById('playerPanel').classList.toggle('visible'); }
function setPlay(v) {
  isPlaying = v;
  const ic = document.getElementById('playIcon');
  if(v) { nativePlayer.play(); ic.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'; } 
  else { nativePlayer.pause(); ic.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
  document.getElementById('playMain').classList.toggle('playing', v);
}
function togglePlay() { setPlay(!isPlaying); }

// Player Progress Update
nativePlayer.ontimeupdate = function() {
  if(!nativePlayer.duration) return;
  const pct = (nativePlayer.currentTime / nativePlayer.duration) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progThumb').style.left = pct + '%';
  document.getElementById('curTime').textContent = formatTime(nativePlayer.currentTime);
  document.getElementById('totTime').textContent = formatTime(nativePlayer.duration);
}

function formatTime(s) { const min=Math.floor(s/60), sec=Math.floor(s%60); return min+':'+(sec<10?'0':'')+sec; }

// ══ OYNATICI İÇİ İNDİRME BUTONU ══
function downloadCurrentMedia() {
  if(!currentMedia) return;
  const quality = currentMedia.mediaType === 'song' ? 'mp3' : '1080p';
  const type = currentMedia.mediaType === 'song' ? 'audio' : 'video';
  showToast(`⬇ ${currentMedia.title} İndiriliyor! Bildirim çubuğunu kontrol edin.`);
  if(typeof YTPROAndroid !== 'undefined') {
    YTPROAndroid.startDownload(currentMedia.url || ('https://youtube.com/watch?v='+currentMedia.id), quality, type, currentMedia.title);
  }
}

window.onload = () => { initSongs(); };
</script>
</body>
</html>
