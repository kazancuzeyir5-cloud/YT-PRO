<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YT-PRO Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ══ TEMA SİSTEMİ ══ */
:root {
  --bg:#0a0a0a; --bg2:#111111; --bg3:#1c1c1c;
  --accent:#e50914; --accent2:#ff2020; --red-glow:rgba(229,9,20,0.35);
  --white:#ffffff; --gray:#999999; --gray2:#2a2a2a;
  --text:#f0f0f0; --card:#181818; --border:rgba(229,9,20,0.25);
  --tr:0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] { --bg:#f5f5f5; --bg2:#ebebeb; --bg3:#dcdcdc; --card:#ffffff; --text:#1a1a1a; --gray:#666666; --gray2:#d0d0d0; --border:rgba(229,9,20,0.3); }
[data-theme="blue"] { --bg:#050a14; --bg2:#0d1526; --bg3:#162035; --accent:#1a6aff; --accent2:#4d8fff; --red-glow:rgba(26,106,255,0.35); --card:#0d1a2e; --gray2:#1a2e4a; --border:rgba(26,106,255,0.25); --text:#e8f0ff; }
[data-theme="purple"] { --bg:#08050f; --bg2:#100a1e; --bg3:#1a1030; --accent:#9c40ff; --accent2:#bf80ff; --red-glow:rgba(156,64,255,0.35); --card:#100a1e; --gray2:#1e1035; --border:rgba(156,64,255,0.25); --text:#f0e8ff; }

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;overscroll-behavior-y:none;}

/* ══ ZARİF TOAST (UYARI) MESAJLARI ══ */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-150%);
  background:var(--card); border:1px solid var(--border); border-left:4px solid var(--accent);
  color:var(--text); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600;
  padding:12px 20px; border-radius:8px; z-index:3000; box-shadow:0 8px 24px rgba(0,0,0,0.8);
  opacity:0; pointer-events:none; transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display:flex; align-items:center; gap:8px; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ══ KOMPAKT ARAMA ══ */
.search-modal {
  position:fixed; top:0; left:0; right:0; background:var(--bg2);
  padding:16px; padding-top:max(16px,env(safe-area-inset-top));
  box-shadow:0 4px 20px rgba(0,0,0,0.8); z-index:2000;
  transform:translateY(-100%); transition:transform 0.3s cubic-bezier(0.2,0.8,0.2,1);
  display:flex; gap:10px; align-items:center; border-bottom:1px solid var(--border);
}
.search-modal.show { transform:translateY(0); }
.search-input-wrap { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; padding:0 12px; }
.search-input-wrap input { flex:1; background:none; border:none; padding:12px 0; color:var(--text); outline:none; font-family:'Rajdhani',sans-serif; font-size:15px; }

/* ══ TOPBAR ══ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:200;padding-top:max(12px,env(safe-area-inset-top));}
.topbar-left{display:flex;align-items:center;gap:12px;}
.menu-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:5px;}
.menu-btn span{display:block;height:2px;background:var(--accent);border-radius:2px;}
.menu-btn span:nth-child(2){width:70%;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--white);}
.logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:var(--tr);}
.icon-btn:active{transform:scale(0.9); border-color:var(--accent); color:var(--accent);}

/* ══ TABS ══ */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.tab-btn{flex:1;padding:14px 0;background:none;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gray);transition:var(--tr);position:relative;}
.tab-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);width:40%;height:3px;background:var(--accent);transition:var(--tr);border-radius:3px 3px 0 0;box-shadow:0 0 10px var(--red-glow);}
.tab-btn.active{color:var(--white);} .tab-btn.active::after{transform:translateX(-50%) scaleX(1);}

/* ══ PULL TO REFRESH (AŞAĞI ÇEK YENİLE) ══ */
.ptr-area { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
.ptr-spinner-container { position:absolute; top:0; left:0; right:0; height:60px; display:flex; align-items:center; justify-content:center; transform:translateY(-100%); z-index:50; }
.ptr-icon { width:28px; height:28px; border:3px solid var(--gray2); border-top-color:var(--accent); border-radius:50%; }
.ptr-content { flex:1; display:flex; flex-direction:column; width:100%; transition:transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); position:relative; z-index:60; background:var(--bg); }
.ptr-content.pulling { transition:none; }

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;animation:fadein .3s ease;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}

.filter-bar{display:flex;gap:8px;padding:12px 16px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--gray2);background:var(--bg3);color:var(--gray);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:var(--tr);}
.f-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(229,9,20,.1);box-shadow:0 0 10px var(--red-glow);}

.list-area{flex:1;overflow-y:auto;padding:0 12px 20px;}
.list-area::-webkit-scrollbar{width:3px;} .list-area::-webkit-scrollbar-thumb{background:var(--accent);}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--gray);padding:8px 4px 6px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ══ CARDS ══ */
.media-card { display:flex; gap:12px; align-items:center; padding:10px; border-radius:12px; background:var(--card); margin-bottom:10px; border:1px solid transparent; transition:var(--tr); cursor:pointer; }
.media-card:active { transform:scale(0.98); border-color:var(--border); }
.thumb { width:90px; height:54px; border-radius:8px; overflow:hidden; position:relative; background:var(--bg3); flex-shrink:0; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.thumb-dur { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,.8); color:#fff; font-family:'Share Tech Mono',monospace; font-size:10px; padding:2px 5px; border-radius:4px; }
.info { flex:1; min-width:0; }
.title { font-size:14px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.meta { font-size:12px; color:var(--gray); font-family:'Share Tech Mono',monospace; }

.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--gray2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;}
@keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}
.skel-card{display:flex;gap:10px;padding:9px 10px;border-radius:8px;background:var(--card);margin-bottom:7px;}
.load-more{text-align:center;padding:14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--gray);}
.load-spinner{width:20px;height:20px;border:2px solid var(--gray2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══ BOTTOM BAR ══ */
.bottombar{background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;flex-shrink:0;padding:8px 0 max(12px,env(safe-area-inset-bottom));z-index:300;}
.bot-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--gray);transition:var(--tr);padding:6px;}
.bot-btn.active, .bot-btn:active{color:var(--accent);}
.bot-btn svg{width:24px;height:24px;}
.bot-btn span{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1.5px;}

/* ════════════════════════════════════════════
   ORİJİNAL ZARİF / NARİN OYNATICI (VİDEO İÇERİR)
══════════════════════════════════════════════ */
.player-panel {
  display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  width:calc(100% - 24px); max-width:440px; background:var(--bg2); border:1px solid var(--border);
  border-radius:16px; padding:16px; box-shadow:0 10px 40px rgba(0,0,0,0.9); z-index:500;
}
.player-panel.visible { display:block; animation:slideup 0.35s cubic-bezier(0.34, 1.4, 0.64, 1); }
@keyframes slideup { from{opacity:0;transform:translateX(-50%) translateY(40px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }

.player-close {
  position:absolute; top:-12px; right:-12px; width:30px; height:30px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--gray2); color:var(--text); font-size:14px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.5);
  transition:var(--tr);
}
.player-close:active { border-color:var(--accent); color:var(--accent); transform:scale(0.9); }

.player-now { display:flex; gap:12px; align-items:center; margin-bottom:14px; }

/* Küçük Oynatıcı Ekranı (Hem kapak hem video) */
.player-art-wrap {
  width:64px; height:64px; border-radius:10px; flex-shrink:0; overflow:hidden;
  border:2px solid var(--accent); position:relative; background:#000;
  box-shadow:0 0 15px rgba(229,9,20,0.3);
}
.player-art-wrap img, .player-art-wrap video { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }

.player-info { flex:1; min-width:0; }
.player-title { font-size:15px; font-weight:700; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.player-artist { font-size:12px; color:var(--gray); font-family:'Share Tech Mono',monospace; }

/* Şık İndirme Butonu (Oynatıcının içinde sağda) */
.player-dl-btn {
  width:42px; height:42px; border-radius:50%; border:1px solid var(--border);
  background:rgba(229,9,20,0.1); color:var(--accent); display:flex; align-items:center;
  justify-content:center; cursor:pointer; transition:transform 0.2s; margin-left:auto; margin-right:8px;
}
.player-dl-btn:active { transform:scale(0.85); background:var(--accent); color:white; }

/* Slider ve Kontroller */
.slider-wrap{position:relative;height:22px;display:flex;align-items:center;cursor:pointer;}
.slider-track{position:absolute;left:0;right:0;height:4px;background:var(--gray2);border-radius:2px;}
.slider-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 5px var(--red-glow);pointer-events:none;}
.slider-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 0 5px var(--red-glow);pointer-events:none;transition:transform .1s;}
.slider-wrap:active .slider-thumb{transform:translate(-50%,-50%) scale(1.4);}

.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--gray);transition:var(--tr);padding:5px;display:flex;align-items:center;justify-content:center;}
.ctrl-btn:active{color:var(--white);transform:scale(1.2);}
.play-main{width:46px;height:46px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px var(--red-glow);transition:var(--tr);}
.play-main:active{transform:scale(0.9);}
.play-main svg{width:22px;height:22px;fill:white;margin-left:2px;}
.play-main.playing svg{margin-left:0;}

/* ══ MODALS ══ */
.overlay, .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:350;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show, .modal-overlay.show{opacity:1;pointer-events:all;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:90%;max-width:380px;animation:modalin .25s ease;overflow:hidden;}
@keyframes modalin{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-head{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.select-wrap{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;padding:12px;border-radius:8px;outline:none;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="search-modal" id="searchModal">
  <div class="search-input-wrap">
    <svg viewBox="0 0 24 24" fill="var(--accent)" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="searchInput" placeholder="Şarkı veya video ara..." onkeydown="if(event.key==='Enter') doGlobalSearch()" />
  </div>
  <button class="icon-btn" onclick="toggleSearch()" style="width:36px;height:36px;border:none;">✕</button>
</div>

<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" onclick="alert('Menü yakında!')"><span></span><span></span><span></span></button>
    <div class="logo">YT<span>-</span>PRO</div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="openUrlModal()">🔗</button>
    <button class="icon-btn" onclick="toggleSearch()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-videos" onclick="switchTab('videos')">▶ VİDEOLAR</button>
  <button class="tab-btn" id="tab-songs" onclick="switchTab('songs')">♪ ŞARKILAR</button>
</div>

<div class="ptr-area">
  <div class="ptr-spinner-container" id="ptrSpinnerContainer">
    <div class="ptr-icon" id="ptrIcon"></div>
  </div>
  <div class="ptr-content" id="ptrContent">
    <div class="main" id="mainArea">
      <div class="tab-panel active" id="panel-videos">
        <div class="filter-bar" id="videoFilters">
          <button class="f-btn active" onclick="setVideoFilter(this,'popular')">🔥 POPÜLER KLİPLER</button>
          <button class="f-btn" onclick="setVideoFilter(this,'new')">✨ YENİ ÇIKANLAR</button>
          <button class="f-btn" onclick="setVideoFilter(this,'rap')">🎤 RAP</button>
        </div>
        <div class="list-area" id="videoList" onscroll="checkScroll('video',this)"></div>
      </div>
      <div class="tab-panel" id="panel-songs">
        <div class="filter-bar" id="songFilters">
          <button class="f-btn active" onclick="setSongFilter(this,'popular')">🔥 TREND MÜZİK</button>
          <button class="f-btn" onclick="setSongFilter(this,'top')">👑 TOP 50</button>
          <button class="f-btn" onclick="setSongFilter(this,'pop')">🎶 POP</button>
        </div>
        <div class="list-area" id="songList" onscroll="checkScroll('song',this)"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottombar">
  <button class="bot-btn" onclick="alert('İndirilenler yakında eklenecek!')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg><span>İNDİRİLENLER</span></button>
  <button class="bot-btn active" onclick="togglePlayer()" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 7.48 2 12s4.48 9 9 10 9-4.03 9-9-4.48-9-9-9zm-2 13.5v-9l6 4.5-6 4.5z"/></svg><span style="font-weight:bold;">OYNATICI</span></button>
  <button class="bot-btn" onclick="alert('Ayarlar yakında!')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg><span>AYARLAR</span></button>
</div>

<div class="player-panel" id="playerPanel">
  <button class="player-close" onclick="togglePlayer()">✕</button>
  <div class="player-now">
    <div class="player-art-wrap" id="playerArtWrap">
      <img id="playerArtImg" src="" style="display:none;">
      <video id="nativePlayer" playsinline preload="auto" style="display:none;"></video>
    </div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">Seçim Yapılmadı</div>
      <div class="player-artist" id="playerArtist">YT-PRO</div>
    </div>
    <button class="player-dl-btn" onclick="downloadCurrentMedia()" title="İndir">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </button>
  </div>
  
  <div style="margin-bottom:6px;">
    <div class="slider-wrap" id="progSlider" style="margin-bottom:4px;">
      <div class="slider-track"><div class="slider-fill" id="progFill" style="width:0%"></div></div>
      <div class="slider-thumb" id="progThumb" style="left:0%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;">
      <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gray);" id="curTime">0:00</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gray);" id="totTime">0:00</span>
    </div>
  </div>
  
  <div style="display:flex;align-items:center;justify-content:center;gap:20px;">
    <button class="ctrl-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
    <button class="play-main" id="playMain" onclick="togglePlay()"><svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z" fill="white"/></svg></button>
    <button class="ctrl-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
  </div>
</div>

<div class="modal-overlay" id="urlModal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-head">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--white);">LİNK İNDİR</span>
      <button class="icon-btn" style="width:32px;height:32px;border:none;background:transparent;" onclick="closeUrlModal()">✕</button>
    </div>
    <div style="padding:16px;">
      <input id="urlInput" type="url" placeholder="YouTube linki yapıştırın..." style="width:100%;background:var(--bg3);border:1px solid var(--gray2);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;padding:12px;border-radius:8px;outline:none;margin-bottom:14px;" />
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="f-btn active" id="urlTypeVideo" onclick="setUrlType('video',this)" style="flex:1;border-radius:8px;">📹 VİDEO</button>
        <button class="f-btn" id="urlTypeAudio" onclick="setUrlType('audio',this)" style="flex:1;border-radius:8px;">🎵 SES</button>
      </div>
      <select class="select-wrap" id="urlQuality" style="width:100%;margin-bottom:14px;">
        <option value="1080p">1080p FHD (Varsayılan)</option>
        <option value="720p">720p HD</option>
        <option value="480p">480p SD</option>
      </select>
      <button onclick="confirmUrlDownload()" style="width:100%;padding:12px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#fff;">İNDİR</button>
    </div>
  </div>
</div>

<script>
// ══ DURUM VE DEĞİŞKENLER ══
let activeTab = 'videos', isPlaying = false, curTrackIdx = 0, currentMedia = null, urlType = 'video';
let videoData = [], songData = [];
let videoPage = 1, songPage = 1, loadingMore = false;
let currentVideoFilter = 'popular', currentSongFilter = 'popular';

// ══ ZARİF TOAST / UYARI ══
let toastT; 
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.innerHTML = isErr ? `⚠️ <span>${msg}</span>` : `✨ <span>${msg}</span>`;
  t.style.borderLeftColor = isErr ? '#ffc107' : 'var(--accent)';
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2500);
}

// ══ ZARİF HATA MESAJI (PRO) ══
function showNoDataMessage(elId, type) {
  const el = document.getElementById(elId); if(!el) return;
  const isOnline = navigator.onLine;
  const icon = isOnline ? `<svg viewBox="0 0 24 24" width="48" height="48" fill="var(--gray)"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/></svg>` : `📵`;
  const msg = isOnline ? 'Sunucuya ulaşılamıyor.' : 'İnternet bağlantınız yok.';
  
  el.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 60px 20px; text-align:center;">
      <div style="opacity:0.4; margin-bottom:16px;">${icon}</div>
      <div style="font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px;">İÇERİK YÜKLENEMEDİ</div>
      <div style="font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--gray); margin-bottom:24px;">${msg}</div>
      <button onclick="${type === 'video' ? 'initVideos()' : 'initSongs()'}" style="background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; padding:8px 24px; border-radius:20px; cursor:pointer; transition:var(--tr);">
        YENİDEN DENE
      </button>
    </div>`;
}

// ══ UI GEÇİŞLERİ ══
function switchTab(t){ activeTab=t; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+t).classList.add('active'); }
function toggleSearch(){ document.getElementById('searchModal').classList.toggle('show'); document.getElementById('searchInput').focus(); }
function openUrlModal(){ document.getElementById('urlModal').classList.add('show'); }
function closeUrlModal(){ document.getElementById('urlModal').classList.remove('show'); }

// ══ AŞAĞI ÇEKİP YENİLEME (PULL TO REFRESH) ANIMASYONU ══
const ptrContent = document.getElementById('ptrContent');
const ptrSpinnerContainer = document.getElementById('ptrSpinnerContainer');
const ptrIcon = document.getElementById('ptrIcon');
let pStartY = 0, pCurrentY = 0, pIsPulling = false;

document.addEventListener('touchstart', e => {
  const activeList = document.querySelector('.tab-panel.active .list-area');
  if(activeList && activeList.scrollTop <= 1) { 
    pStartY = e.touches[0].clientY; pIsPulling = true; ptrContent.classList.add('pulling');
  }
}, {passive:true});

document.addEventListener('touchmove', e => {
  if(!pIsPulling) return;
  pCurrentY = e.touches[0].clientY; let dy = pCurrentY - pStartY;
  if(dy > 0) {
    let pullDist = Math.min(dy * 0.4, 70);
    ptrContent.style.transform = `translateY(${pullDist}px)`;
    ptrSpinnerContainer.style.transform = `translateY(${pullDist - 60}px)`;
    ptrIcon.style.transform = `rotate(${dy}deg)`;
  }
}, {passive:true});

document.addEventListener('touchend', () => {
  if(!pIsPulling) return;
  pIsPulling = false; ptrContent.classList.remove('pulling');
  let dy = pCurrentY - pStartY;
  if(dy * 0.4 > 50) { 
    ptrContent.style.transform = `translateY(50px)`;
    ptrSpinnerContainer.style.transform = `translateY(-10px)`;
    ptrIcon.style.animation = 'spin 0.6s linear infinite';
    if(activeTab === 'videos') initVideos(currentVideoFilter); else initSongs(currentSongFilter);
    setTimeout(() => {
      ptrContent.style.transform = `translateY(0)`;
      ptrSpinnerContainer.style.transform = `translateY(-100%)`;
      ptrIcon.style.animation = 'none'; showToast('İçerik güncellendi');
    }, 1200);
  } else { 
    ptrContent.style.transform = `translateY(0)`; ptrSpinnerContainer.style.transform = `translateY(-100%)`;
  }
});

// ══ VERİ ÇEKME (NEWPIPE) ══
function skeletonCards(n) { return Array.from({length:n},()=>`<div class="skel-card"><div class="skeleton skel-thumb" style="width:90px;height:54px;"></div><div class="skel-info"><div class="skeleton skel-line w80"></div><div class="skeleton skel-line w50"></div></div></div>`).join(''); }

function initVideos(category='popular') {
  currentVideoFilter = category;
  document.getElementById('videoList').innerHTML = '<div class="section-label">KLİPLER YÜKLENİYOR...</div>' + skeletonCards(6);
  if (typeof YTPROAndroid !== 'undefined') {
    const filterMap = { popular:'türkçe pop klipler trend', new:'yeni klipler', rap:'türkçe rap klip' };
    YTPROAndroid.searchWithNewPipe(filterMap[category] || category, 'onVideosLoaded');
  } else { showNoDataMessage('videoList', 'video'); }
}
function onVideosLoaded(data) {
  if (!data || !data.length) { showNoDataMessage('videoList', 'video'); return; }
  videoData = data; videoPage = 1;
  const el = document.getElementById('videoList');
  el.innerHTML = '<div class="section-label">POPÜLER KLİPLER</div>' + data.map((v,i) => `
    <div class="media-card" onclick="playMedia('video', ${i})">
      <div class="thumb"><img src="${v.thumb||''}"><span class="thumb-dur">${v.duration||''}</span></div>
      <div class="info"><div class="title">${v.title}</div><div class="meta">${v.channel}</div></div>
    </div>`).join('');
  el.insertAdjacentHTML('beforeend','<div class="load-more" id="videoLoadMore">Aşağı kaydırarak yükle...</div>');
}

function initSongs(category='popular') {
  currentSongFilter = category;
  document.getElementById('songList').innerHTML = '<div class="section-label">ŞARKILAR YÜKLENİYOR...</div>' + skeletonCards(6);
  if (typeof YTPROAndroid !== 'undefined') {
    const filterMap = { popular:'türkçe pop şarkılar audio', top:'türkçe hit audio', pop:'hareketli pop audio' };
    YTPROAndroid.searchWithNewPipe(filterMap[category] || category, 'onSongsLoaded');
  } else { showNoDataMessage('songList', 'song'); }
}
function onSongsLoaded(data) {
  if (!data || !data.length) { showNoDataMessage('songList', 'song'); return; }
  songData = data; songPage = 1;
  const el = document.getElementById('songList');
  el.innerHTML = '<div class="section-label">MÜZİK LİSTESİ</div>' + data.map((s,i) => `
    <div class="media-card" onclick="playMedia('song', ${i})">
      <div class="thumb"><img src="${s.thumb||''}"><span class="thumb-dur">${s.duration||''}</span></div>
      <div class="info"><div class="title">${s.title}</div><div class="meta">${s.artist||s.channel}</div></div>
    </div>`).join('');
  el.insertAdjacentHTML('beforeend','<div class="load-more" id="songLoadMore">Aşağı kaydırarak yükle...</div>');
}

function doGlobalSearch() {
  const q = document.getElementById('searchInput').value; if(!q) return;
  toggleSearch();
  if(activeTab === 'videos') initVideos(q); else initSongs(q + ' audio');
}
function setVideoFilter(btn,f){ document.querySelectorAll('#videoFilters .f-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); initVideos(f); }
function setSongFilter(btn,f){ document.querySelectorAll('#songFilters .f-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); initSongs(f); }

// ══ NARİN VİDEOLU OYNATICI ══
const nativePlayer = document.getElementById('nativePlayer');
const playerArtImg = document.getElementById('playerArtImg');

function togglePlayer() { document.getElementById('playerPanel').classList.toggle('visible'); }

function playMedia(type, idx) {
  curTrackIdx = idx;
  const list = type === 'video' ? videoData : songData;
  const m = list[idx];
  currentMedia = { ...m, mediaType: type };
  
  document.getElementById('playerTitle').textContent = m.title || m.t;
  document.getElementById('playerArtist').textContent = m.channel || m.a || m.artist;
  document.getElementById('totTime').textContent = m.duration || m.dur || '0:00';
  
  const thumbUrl = m.thumb || `https://img.youtube.com/vi/${m.ytId||m.id}/mqdefault.jpg`;
  playerArtImg.src = thumbUrl;
  
  // VİDEO İSE OYNATICININ İÇİNDE GÖSTER, DEĞİLSE RESİM GÖSTER!
  if (type === 'video') {
    playerArtImg.style.display = 'none';
    nativePlayer.style.display = 'block';
    nativePlayer.poster = thumbUrl;
  } else {
    nativePlayer.style.display = 'none';
    playerArtImg.style.display = 'block';
  }

  if(typeof YTPROAndroid !== 'undefined') {
    showToast('Bağlantı Kuruluyor...', false);
    YTPROAndroid.getPreviewUrl(m.url || ('https://youtube.com/watch?v='+(m.ytId||m.id)), 'onStreamReady');
  }
  
  document.getElementById('playerPanel').classList.add('visible');
  setPlay(false);
}

function onStreamReady(info) {
  if(!info || (!info.bestAudioUrl && !info.previewVideoUrl)) { showToast('Oynatılamıyor.', true); return; }
  nativePlayer.src = (currentMedia.mediaType === 'song') ? (info.bestAudioUrl || info.previewVideoUrl) : (info.previewVideoUrl || info.bestAudioUrl);
  nativePlayer.play();
  setPlay(true);
}

function setPlay(v) {
  isPlaying = v;
  const ic = document.getElementById('playIcon');
  if(v) { nativePlayer.play(); ic.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'; } 
  else { nativePlayer.pause(); ic.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
  document.getElementById('playMain').classList.toggle('playing', v);
}
function togglePlay() { setPlay(!isPlaying); }
function nextTrack() { const list = currentMedia?.mediaType === 'video' ? videoData : songData; if(list.length) playMedia(currentMedia.mediaType, (curTrackIdx+1)%list.length); }
function prevTrack() { const list = currentMedia?.mediaType === 'video' ? videoData : songData; if(list.length) playMedia(currentMedia.mediaType, (curTrackIdx-1+list.length)%list.length); }

nativePlayer.ontimeupdate = function() {
  if(!nativePlayer.duration) return;
  const pct = (nativePlayer.currentTime / nativePlayer.duration) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progThumb').style.left = pct + '%';
  document.getElementById('curTime').textContent = formatTime(nativePlayer.currentTime);
}
function formatTime(s) { const min=Math.floor(s/60), sec=Math.floor(s%60); return min+':'+(sec<10?'0':'')+sec; }

// ══ ŞIK İNDİRME ══
function downloadCurrentMedia() {
  if(!currentMedia) return;
  const title = currentMedia.title || currentMedia.t;
  const ytId = currentMedia.ytId || currentMedia.id;
  const url = currentMedia.url || `https://youtube.com/watch?v=${ytId}`;
  const quality = currentMedia.mediaType === 'video' ? '1080p' : 'mp3';
  const type = currentMedia.mediaType === 'video' ? 'video' : 'audio';
  startRealDl(title, url, ytId, type, quality);
}

// ══ LİNK İLE İNDİRME (MP3) ══
function setUrlType(t, btn){
  urlType = t;
  document.querySelectorAll('#urlModal .f-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  const qSelect = document.getElementById('urlQuality');
  if(t === 'audio'){
    qSelect.innerHTML = '<option value="mp3" selected>MP3 (Yüksek Kalite Ses)</option><option value="m4a">M4A (Standart Ses)</option>';
  } else {
    qSelect.innerHTML = '<option value="1080p" selected>1080p FHD (Varsayılan)</option><option value="720p">720p HD</option><option value="480p">480p SD</option>';
  }
}
function confirmUrlDownload(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url || !url.includes('youtu')) { showToast('Geçerli YouTube linki girin', true); return; }
  closeUrlModal();
  const qVal = document.getElementById('urlQuality').value;
  startRealDl('İndirilen İçerik', url, 'id', urlType, qVal);
  document.getElementById('urlInput').value = '';
}

function startRealDl(title, url, ytId, type, quality) {
  showToast('Sıraya Eklendi: ' + title.substring(0,15) + '...');
  if(typeof YTPROAndroid !== 'undefined') {
    YTPROAndroid.startDownload(url, quality, type, title);
  }
}

// Slider Logic
function setupSlider(el, fn){
  let dragging=false;
  function getPct(e){ const r=el.getBoundingClientRect(); return Math.min(100,Math.max(0,(((e.touches?e.touches[0]:e).clientX-r.left)/r.width)*100)); }
  function start(e){dragging=true;fn(getPct(e));} function move(e){if(dragging)fn(getPct(e));} function end(){dragging=false;}
  el.addEventListener('mousedown',start); el.addEventListener('touchstart',start,{passive:true});
  document.addEventListener('mousemove',move); document.addEventListener('touchmove',move,{passive:true});
  document.addEventListener('mouseup',end); document.addEventListener('touchend',end);
}

window.onload = () => {
  initVideos(); initSongs();
  setupSlider(document.getElementById('progSlider'), pct=>{ if(nativePlayer.duration) nativePlayer.currentTime = (pct/100)*nativePlayer.duration; });
};
</script>
</body>
</html>
