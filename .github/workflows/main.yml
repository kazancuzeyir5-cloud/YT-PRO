name: Build YT-PRO APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle 8.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt
        echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Download yt-dlp
      run: |
        mkdir -p app/src/main/assets
        curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64" \
          -o app/src/main/assets/yt-dlp
        chmod +x app/src/main/assets/yt-dlp

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Build APK
      run: gradle assembleDebug --no-daemon
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YT-PRO-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
